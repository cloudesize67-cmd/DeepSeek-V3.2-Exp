name: Python Package using Conda

on: [push]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 5

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: '3.10'
    - name: Add conda to system path
      run: |
        # $CONDA is an environment variable pointing to the root of the miniconda directory
        echo $CONDA/bin >> $GITHUB_PATH
    - name: Install dependencies
      run: |
        conda env update --file environment.yml --name base
    - name: Lint with flake8
      run: |
        conda install flake8
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    - name: Test with pytest
      run: |
        conda install pytest
        pytest

  security-scan:
    runs-on: ubuntu-latest
    needs: build-linux
    name: Security Analysis

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: '3.10'

    - name: Install security tools
      run: |
        pip install bandit[toml] safety pip-audit

    - name: Static security analysis (Bandit — OWASP/CWE checks)
      # Checks for: B101 assert-used, B105/B106/B107 hardcoded passwords,
      # B110 try-except-pass, B602/B603 subprocess/shell injection, etc.
      run: |
        bandit -r inference/ \
          --severity-level medium \
          --confidence-level medium \
          --format json \
          --output bandit-report.json \
          || true
        bandit -r inference/ \
          --severity-level high \
          --confidence-level high \
          --exit-zero

    - name: Upload Bandit report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: bandit-security-report
        path: bandit-report.json

    - name: Dependency vulnerability audit (pip-audit)
      # Checks installed packages against OSV / PyPA advisory databases
      run: |
        pip install -r inference/requirements.txt --quiet || true
        pip-audit --format json --output pip-audit-report.json \
          --ignore-vuln PYSEC-2022-42969 \
          || true
        pip-audit --desc --strict \
          --ignore-vuln PYSEC-2022-42969 \
          || echo "::warning::pip-audit found advisories — review pip-audit-report.json"

    - name: Upload pip-audit report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: pip-audit-report
        path: pip-audit-report.json

    - name: Secret scanning (detect hardcoded credentials)
      run: |
        pip install detect-secrets
        detect-secrets scan --all-files \
          --exclude-files '\.git/.*' \
          --exclude-files '.*\.pdf' \
          --exclude-files '.*\.jpg' \
          > .secrets.baseline 2>&1 || true
        # Fail if high-confidence secrets are detected
        python - <<'EOF'
        import json, sys
        with open(".secrets.baseline") as f:
            baseline = json.load(f)
        results = baseline.get("results", {})
        high_conf = [
            (fp, s) for fp, secrets in results.items()
            for s in secrets if s.get("is_verified") or s.get("type") in
            ("Hex High Entropy String", "Base64 High Entropy String", "AWS Access Key")
        ]
        if high_conf:
            for fp, s in high_conf:
                print(f"::error file={fp}::Potential secret: {s['type']} at line {s['line_number']}")
            sys.exit(1)
        EOF

    - name: Security unit tests
      run: |
        pip install pytest
        pytest inference/tests/test_security.py -v --tb=short
